name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to release, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

  pytest:
    name: Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio
          python -m pip install pytest-homeassistant-custom-component homeassistant pymodbus

      - name: Run test suite
        run: pytest

  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run HACS validation
        uses: hacs/action@main
        with:
          category: integration
          ignore: topics

  build:
    name: Build Release Artifact
    runs-on: ubuntu-latest
    needs:
      - hassfest
      - pytest
      - hacs

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate Python sources
        run: python -m py_compile custom_components/meltem_ventilation/*.py

      - name: Determine release tag
        id: release_meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi

          ZIP_NAME="meltem-ha-${TAG_NAME}.zip"

          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "zip_name=${ZIP_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Build release archive
        shell: bash
        run: |
          mkdir -p dist
          zip -r "dist/${{ steps.release_meta.outputs.zip_name }}" \
            custom_components \
            CHANGELOG.md \
            LICENSE \
            README.md \
            hacs.json

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
          ZIP_NAME: ${{ steps.release_meta.outputs.zip_name }}
        shell: bash
        run: |
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "dist/${ZIP_NAME}" --clobber
          else
            gh release create "${TAG_NAME}" "dist/${ZIP_NAME}" --generate-notes
          fi
